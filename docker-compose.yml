# 五行律音 · 一键启动后端 API + 管理后台
# 用法：docker compose up -d --build
# 数据库连接、JWT、管理员账号等配置读取 backend/.env
#
# 部署到 1Panel：MySQL 在 1Panel 的 1panel-network 网络内，
# 本 compose 让 api/admin 接入同一外部网络，用 MySQL 容器名直连。
# .env 的 DATABASE_URL 形如：
#   mysql+pymysql://用户名:密码@<MySQL容器名>:3306/wuxing?charset=utf8mb4

services:
  api:
    build: ./backend
    image: wuxing-backend:latest
    container_name: wuxing-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - default          # 与 admin 互通
      - onepanel          # 接入 1Panel 网络以访问 MySQL

  admin:
    build: ./admin
    image: wuxing-admin:latest
    container_name: wuxing-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - default

  h5:
    build:
      context: .
      dockerfile: docker/Dockerfile.h5
    image: wuxing-h5:latest
    container_name: wuxing-h5
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - api
    networks:
      - default

volumes:
  uploads_data:

networks:
  default:
  # 1Panel 已创建的网络（external），MySQL 容器在其中
  onepanel:
    external: true
    name: 1panel-network
