services:
  api:
    build: .
    image: wuxing-backend:latest
    container_name: wuxing-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 连接外部 MySQL，连接串在 .env 配置
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173"]}
    # 让容器能用 host.docker.internal 访问宿主机上的 MySQL。
    # 若 MySQL 在独立服务器，直接在 DATABASE_URL 里写其 IP/域名，可删除此段。
    extra_hosts:
      - "host.docker.internal:host-gateway"
